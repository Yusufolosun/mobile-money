version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Africa/Lagos"
    open-pull-requests-limit: 10
    reviewers:
      - "RemmyAcee"
    assignees:
      - "RemmyAcee"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      security-npm:
        applies-to: "security-updates"
        patterns:
          - "*"
      npm-production:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      npm-development:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/bridge-starter-node"
    schedule:
      interval: "daily"
      time: "06:05"
      timezone: "Africa/Lagos"
    open-pull-requests-limit: 5
    reviewers:
      - "RemmyAcee"
    assignees:
      - "RemmyAcee"
    labels:
      - "dependencies"
      - "npm"
      - "bridge-starter-node"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      security-bridge-npm:
        applies-to: "security-updates"
        patterns:
          - "*"
      bridge-npm-production:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      bridge-npm-development:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "cargo"
    directory: "/contracts"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:15"
      timezone: "Africa/Lagos"
    open-pull-requests-limit: 5
    reviewers:
      - "RemmyAcee"
    assignees:
      - "RemmyAcee"
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      security-cargo:
        applies-to: "security-updates"
        patterns:
          - "*"
      cargo-dependencies:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "Africa/Lagos"
    open-pull-requests-limit: 5
    reviewers:
      - "RemmyAcee"
    assignees:
      - "RemmyAcee"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      security-github-actions:
        applies-to: "security-updates"
        patterns:
          - "*"
      github-actions:
        patterns:
          - "*"
